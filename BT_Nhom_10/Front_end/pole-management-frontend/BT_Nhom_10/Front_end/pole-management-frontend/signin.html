<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #232d3f;
      --panel-soft: #2b3447;
      --green: #58d092;
      --green-strong: #42c67f;
      --green-soft: #d9f8e7;
      --text: #1b1b1f;
      --muted: #8b8f9c;
      --line: rgba(255, 255, 255, 0.12);
      --field-bg: #ffffff;
      --shadow: 0 28px 70px rgba(18, 23, 35, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 22%, rgba(88, 208, 146, 0.12), transparent 18%),
        radial-gradient(circle at 82% 78%, rgba(88, 208, 146, 0.1), transparent 16%),
        linear-gradient(135deg, #f7fbf8 0%, #ffffff 42%, #f6fbff 100%);
      color: var(--text);
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(90deg, transparent 0 11%, rgba(88, 208, 146, 0.08) 11% 11.15%, transparent 11.15% 100%),
        linear-gradient(180deg, transparent 0 16%, rgba(88, 208, 146, 0.06) 16% 16.15%, transparent 16.15% 100%);
      opacity: 0.55;
    }

    body::after {
      background:
        radial-gradient(circle at 14% 68%, rgba(35, 45, 63, 0.06) 0 10px, transparent 11px),
        radial-gradient(circle at 76% 28%, rgba(35, 45, 63, 0.05) 0 8px, transparent 9px),
        radial-gradient(circle at 84% 72%, rgba(35, 45, 63, 0.05) 0 6px, transparent 7px);
      opacity: 0.9;
    }

    .signin-shell {
      width: min(100%, 640px);
      position: relative;
      z-index: 1;
    }

    .signin-panel-wrap {
      width: 100%;
    }

    .signin-panel {
      width: 100%;
      background: var(--panel);
      border-radius: 17px;
      box-shadow: 0 22px 52px rgba(18, 23, 35, 0.17);
      padding: 30px 26px 24px;
    }

    .brand-mark {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: var(--green);
      margin-bottom: 26px;
    }

    .brand-mark__icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .brand-mark__name {
      margin: 0;
      font-size: clamp(30px, 4.6vw, 44px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand-mark__tagline {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: 500;
      color: rgba(88, 208, 146, 0.88);
    }

    .signin-form {
      display: grid;
      gap: 16px;
    }

    .field {
      position: relative;
    }

    .field__input {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 13px;
      background: var(--field-bg);
      padding: 0 22px 0 62px;
      font: inherit;
      font-size: 17px;
      color: #20222b;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(18, 23, 35, 0.06);
    }

    .field__input::placeholder {
      color: #272a33;
      opacity: 0.9;
    }

    .field__icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #262a32;
      opacity: 0.92;
    }

    .field__icon {
      left: 22px;
      width: 22px;
      height: 22px;
      pointer-events: none;
    }

    .signin-btn {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 13px;
      background: linear-gradient(180deg, var(--green) 0%, var(--green-strong) 100%);
      color: #ffffff;
      font: inherit;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .signin-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(66, 198, 127, 0.25);
    }

    @media (max-width: 1200px) {
      .signin-shell {
        width: min(100%, 640px);
      }
    }

    @media (max-width: 720px) {
      .signin-panel {
        padding: 24px 18px 22px;
      }

      .brand-mark {
        margin-bottom: 24px;
      }

      .brand-mark__icon {
        width: 36px;
        height: 36px;
      }

      .field__input,
      .signin-btn {
        height: 58px;
      }

      .field__input {
        padding-left: 56px;
        padding-right: 18px;
        font-size: 17px;
      }

      .field__icon {
        left: 16px;
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="signin-shell">
    <section class="signin-panel-wrap">
      <div class="signin-panel">
        <div class="brand-mark">
          <svg class="brand-mark__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 32L17 22" stroke="#58D092" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 32L17 42" stroke="#58D092" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M57 32L47 22" stroke="#58D092" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M57 32L47 42" stroke="#58D092" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M35.4 10L18.1 34H30.8L27.9 54L45.9 29.9H33.2L35.4 10Z" fill="#58D092"/>
          </svg>
          <div>
            <h1 class="brand-mark__name">changeon</h1>
            <p class="brand-mark__tagline">Smart Solutions for EV Charging Management</p>
          </div>
        </div>

        <form class="signin-form" id="signinForm">
          <label class="field">
            <span class="sr-only"></span>
            <input class="field__input" id="usernameInput" type="text" placeholder="Username" autocomplete="username" required>
            <svg class="field__icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M16 15.2C19.0928 15.2 21.6 12.6928 21.6 9.6C21.6 6.50721 19.0928 4 16 4C12.9072 4 10.4 6.50721 10.4 9.6C10.4 12.6928 12.9072 15.2 16 15.2Z" stroke="currentColor" stroke-width="2.8"/>
              <path d="M6 27.2C6.77042 22.686 10.6475 19.2 16 19.2C21.3525 19.2 25.2296 22.686 26 27.2" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
            </svg>
          </label>

          <label class="field">
            <input class="field__input" id="passwordInput" type="password" placeholder="Passwords" autocomplete="current-password" required>
            <svg class="field__icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="7.2" y="14.4" width="17.6" height="12.8" rx="2.6" stroke="currentColor" stroke-width="2.8"/>
              <path d="M11.2 14.4V10.9C11.2 8.24903 13.349 6.1 16 6.1C18.651 6.1 20.8 8.24903 20.8 10.9V14.4" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
              <circle cx="16" cy="20.3" r="1.8" fill="currentColor"/>
            </svg>
          </label>

          <button class="signin-btn" type="submit">Login</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const signinForm = document.getElementById("signinForm");

    signinForm?.addEventListener("submit", function (event) {
      event.preventDefault();
      window.location.href = "./station.html";
    });
  </script>
</body>
</html>
